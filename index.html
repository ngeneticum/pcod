<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPiX Matrix Terminal</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --neon: #00ff9f; --gold: #ffd700; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: monospace; }
        
        /* ГЛАВНЫЙ ЭКРАН */
        #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* ШАПКА */
        header { padding: 15px; display: flex; justify-content: space-between; font-size: 12px; color: var(--neon); background: #050505; border-bottom: 1px solid #111; }

        /* МАТРИЦА */
        #matrix { 
            flex-grow: 1; display: grid; grid-template-columns: repeat(16, 1fr); 
            gap: 2px; padding: 10px; background: #000;
        }
        .n { background: #0a0a0a; border: 0.1px solid #151515; aspect-ratio: 1/1; }
        .a { background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* ВЫЕЗДНАЯ ПАНЕЛЬ */
        #side { 
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px; 
            background: rgba(5, 5, 5, 0.98); border-right: 1px solid var(--neon);
            transform: translateX(-100%); transition: 0.3s ease;
            z-index: 1000; padding: 20px; box-sizing: border-box; box-shadow: 10px 0 30px #000;
        }
        #side.open { transform: translateX(0); }

        /* КНОПКА UI */
        #m-btn { 
            position: fixed; bottom: 25px; left: 25px; width: 55px; height: 55px; 
            background: var(--neon); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; z-index: 1100; box-shadow: 0 0 20px var(--neon);
        }

        /* КОНТЕНТ ПАНЕЛИ */
        .card { border-left: 3px solid var(--neon); background: #080808; padding: 10px; margin-bottom: 12px; }
        .gold { color: var(--gold); }
        #log { height: 100px; overflow: auto; color: var(--neon); font-size: 10px; margin: 10px 0; border: 1px solid #222; padding: 5px; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; font-size: 12px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--neon); color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* QR */
        #q-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center;
