<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitPiX Matrix | Quantum Terminal v2.0</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000205; --neon: #00ff9f; --gold: #ffd700; --sol: #8c01ff; --pump: #ff00ff;
            --text: #e0f7fa; --font-mono: 'JetBrains Mono', monospace;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* SIDEBAR И ЛОГИКА СВОРАЧИВАНИЯ */
        #sidebar { 
            width: 380px; min-width: 380px; background: rgba(0, 5, 10, 0.98); 
            border-right: 1px solid rgba(0, 255, 159, 0.2); padding: 20px; 
            display: flex; flex-direction: column; z-index: 1000; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; box-sizing: border-box;
        }

        #sidebar.collapsed {
            margin-left: -380px;
        }

        /* Кнопка-язычок */
        #sidebar-toggle {
            position: absolute; right: -30px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 80px; background: var(--neon); color: #000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 800; font-family: var(--font-mono);
            clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%);
            z-index: 1001; transition: 0.3s;
        }
        #sidebar-toggle:hover { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main { 
            flex-grow: 1; display: flex; flex-direction: column; 
            padding: 20px; background: #000; position: relative;
            transition: width 0.4s ease;
        }

        /* МАТРИЦА АГЕНТОВ */
        #matrix-container {
            flex-grow: 1; display: grid; grid-template-columns: repeat(16, 1fr); 
            gap: 4px; background: rgba(0, 255, 159, 0.02);
            padding: 10px; border: 1px solid rgba(0, 255, 159, 0.1);
        }
        .agent-node { 
            width: 100%; aspect-ratio: 1/1; background: #05100a; 
            border: 1px solid #0a2015; cursor: pointer; transition: 0.2s;
        }
        .agent-node:hover { border-color: var(--neon); background: #0a3020; }
        .node-active { background: var(--neon) !important; box-shadow: 0 0 8px var(--neon); }

        /* ЭЛЕМЕНТЫ ИНТЕРФЕЙСА */
        .box { 
            background: rgba(255,255,255,0.03); border-left: 2px solid var(--neon);
            padding: 12px; margin-bottom: 10px; border-radius: 2px;
        }
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-family: var(--font-mono); font-size: 0.7em
