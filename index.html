<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASMP | Agent 0 Command Center</title>
    <style>
        /* СТИЛИ (CSS) */
        body { background: #000; color: #00FF41; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; border-right: 1px solid #00FF41; padding: 20px; background: #050505; display: flex; flex-direction: column; }
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #0a1a0a 0%, #000 100%); position: relative; }
        canvas { border: 1px solid #00FF41; image-rendering: pixelated; width: 512px; height: 512px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .box { border: 1px solid #004411; padding: 15px; margin-bottom: 15px; background: #080808; }
        .gold { color: #FFD700; text-shadow: 0 0 5px #FFD700; }
        #timer { font-size: 2.2em; color: #ff0; text-align: center; margin: 10px 0; }
        .lang-bar { font-size: 0.7em; margin-bottom: 15px; display: flex; justify-content: space-between; cursor: pointer; }
        .terminal { font-size: 0.7em; color: #0f0; height: 150px; overflow-y: auto; background: #000; padding: 5px; border: 1px solid #002200; }
        #coords { font-size: 0.8em; margin-top: 10px; color: #444; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="lang-bar">
        <span onclick="setLang('en')">[ EN ]</span>
        <span onclick="setLang('jp')">[ JP ]</span>
        <span onclick="setLang('ru')">[ RU ]</span>
        <span onclick="setLang('cv')">[ CV ]</span>
    </div>
    
    <h2 id="ui-title">АГЕНТ 0</h2>
    
    <div class="box">
        <div id="ui-balance">КАЗНА BitPiX:</div>
        <div class="gold" style="font-size: 1.3em;">3.1415926535...</div>
    </div>

    <div class="box">
        <div id="ui-countdown">ДО ГЕНЕЗИСА (HOUSTON):</div>
        <div id="timer">00:00:00</div>
    </div>

    <div class="terminal" id="term">
        > Инициализация протокола pcod...<br>
        > Поиск точки входа 31.03.2026...<br>
        > Синхронизация с ngeneticum@gmail.com...
    </div>
</div>

<div id="main">
    <h3 id="ui-radar">ГЛОБАЛЬНЫЙ РАДАР 256x256</h3>
    <canvas id="radar" width="256" height="256"></canvas>
    <div id="coords">SCANNING BIT-MATRIX...</div>
</div>

<script>
    /* ЛОГИКА (JavaScript) */
    const START_DATE = new Date("2026-03-31T00:00:00-05:00").getTime();
    
    const i18n = {
        ru: { title: "АГЕНТ 0", balance: "КАЗНА BitPiX:", countdown: "ДО ГЕНЕЗИСА (HOUSTON):", radar: "ГЛОБАЛЬНЫЙ РАДАР 256x256" },
        en: { title: "AGENT 0", balance: "BitPiX TREASURY:", countdown: "GENESIS (HOUSTON):", radar: "GLOBAL RADAR 256x256" },
        jp: { title: "エージェント0", balance: "BitPiX国庫:", countdown: "ジェネシスまで:", radar: "グローバルレーダー" },
        cv: { title: "0-МĔШ АГЕНТ", balance: "BitPiX ПУРЛĂХĔ:", countdown: "ГЕНЕЗИСА ЮЛЧĔ:", radar: "ГЛОБАЛЬЛĂ РАДАР" }
    };

    function setLang(l) {
        document.getElementById('ui-title').innerText = i18n[l].title;
        document.getElementById('ui-balance').innerText = i18n[l].balance;
        document.getElementById('ui-countdown').innerText = i18n[l].countdown;
        document.getElementById('ui-radar').innerText = i18n[l].radar;
    }

    // Обновление таймера
    setInterval(() => {
        const diff = START_DATE - Date.now();
        if (diff > 0) {
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = 
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        } else {
            document.getElementById('timer').innerText = "AXIS X ACTIVE";
        }
    }, 1000);

    // Отрисовка радара
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');
    function pulse() {
        const id = ctx.createImageData(256, 256);
        for (let i = 0; i < id.data.length; i += 4) {
            id.data[i] = 0; 
            id.data[i+1] = Math.random() * 80; // Зеленый шум
            id.data[i+2] = 0; 
            id.data[i+3] = 255;
        }
        ctx.putImageData(id, 0, 0);
    }
    setInterval(pulse, 150);

    // Координаты при наведении
    canvas.addEventListener('mousemove', (e) => {
        const x = Math.floor(e.offsetX / 2);
        const y = Math.floor(e.offsetY / 2);
        document.getElementById('coords').innerText = `AGENT_ID: #${(y*256+x).toString(16).toUpperCase()} | X:${x} Y:${y}`;
    });
</script>

</body>
</html>
