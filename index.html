<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BPX Matrix Final</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff9f; --gold: #ffd700; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden; font-family: 'JetBrains Mono', monospace;
        }

        /* ГЛАВНЫЙ ЭКРАН С МАТРИЦЕЙ */
        #viewport {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            padding: 15px; position: relative; background: #000;
        }

        #matrix {
            flex-grow: 1; display: grid; 
            grid-template-columns: repeat(16, 1fr); gap: 2px;
            margin-top: 40px; /* Место под заголовок */
        }

        .dot { background: #080808; border: 0.5px solid #111; aspect-ratio: 1/1; transition: 0.1s; }
        .on { background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* КНОПКА ВЫЗОВА ПАНЕЛИ */
        #menu-trigger {
            position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--neon); color: #000; padding: 8px 15px;
            font-weight: 800; font-size: 12px; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        /* ВЫЕЗДНАЯ ПАНЕЛЬ (OVERLAY) */
        #panel {
            position: fixed; top: 0; left: 0; width: 300px; height: 100%;
            background: rgba(0, 5, 10, 0.98); border-right: 1px solid var(--neon);
            transform: translateX(-100%); transition: transform 0.3s ease;
            z-index: 10000; padding: 25px; display: flex; flex-direction: column;
            box-shadow: 20px 0 50px #000;
        }
        #panel.active { transform: translateX(0); }

        /* ЭЛЕМЕНТЫ ВНУТРИ */
        .card { border-left: 2px solid var(--neon); background: #0a0a0a; padding: 10px; margin-bottom: 15px; }
        #log { height: 120px; overflow-y: auto; font-size: 9px; color: var(--neon); border: 1px solid #1a1a1a; padding: 5px; margin: 10px 0; }
        
        input, button { 
            width: 100%; background: #000; border: 1px solid var(--neon); 
            color: var(--neon); padding: 12px; margin-top: 8px; font-family: inherit;
        }
        button { background: var(--neon); color: #000; font-weight: 800; cursor: pointer; }

        /* МОДАЛКА QR */
        #qr-wrap {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; z-index: 11000;
        }

        /* ПЛАВАЮЩИЙ РАДАР (ДЕКОР) */
        #radar-dec {
            position: fixed; bottom: 10px; right: 10px; width: 80px; height: 80px;
            border: 1px solid rgba(0, 255, 159, 0.2); border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="menu-trigger" onclick="toggleP()">SYSTEM_UI</div>

<div id="panel">
    <div id="ton-connect-btn"></div>
    
    <div class="card" style="margin-top:20px; border-color:var(--gold)">
        <div style="font-size:10px; opacity:0.5">MASTER_VAULT:</div>
        <div style="font-size:9px; color:var(--gold); word-break:break-all">UQC58LnAAihOCV9ysN7iMsMb9bDh2YnICma4UNVYQ0dSYqXQ</div>
    </div>

    <div class="card">
        <div style="font-size:10px; display:flex; justify-content:space-between">
            <span>BTC: <b id="b-p">68k</b></span>
            <span>TON: <b>7.2</b></span>
        </div>
        <div style="font-size:10px; margin-top:5px">BPX_INDEX: <b style="color:var(--gold)">3.1415</b></div>
    </div>

    <div id="log"></div>

    <input type="text" id="dest" placeholder="TON/SOL ADDRESS">
    <input type="number" id="val" placeholder="AMOUNT">
    <button onclick="send()">CONFIRM WITHDRAW</button>
    
    <button onclick="toggleP()" style="background:#333; color:#fff; margin-top:20px; font-size:10px">CLOSE MENU</button>
</div>

<div id="viewport">
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--neon)">
        <span>QUANTUM_MATRIX_256</span>
        <span id="stat">LOAD: 0%</span>
    </div>
    <div id="matrix"></div>
</div>

<div id="radar-dec"></div>
