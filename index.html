<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitPiX Matrix</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff9f; --gold: #ffd700; --bg: #000; }
        * { box-sizing: border-box; }
        body, html { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden; font-family: sans-serif;
        }

        /* МАТРИЦА НА ВЕСЬ ЭКРАН */
        #main {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            padding: 10px; position: relative; z-index: 1;
        }
        #matrix-container {
            flex-grow: 1; display: grid; grid-template-columns: repeat(16, 1fr);
            gap: 2px; border: 1px solid #111;
        }
        .node { background: #050505; border: 1px solid #111; aspect-ratio: 1/1; }
        .active { background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* ВЫЕЗДНАЯ ПАНЕЛЬ (SIDEBAR) */
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
            background: rgba(0, 0, 0, 0.95); border-right: 1px solid var(--neon);
            transform: translateX(-100%); transition: 0.3s; z-index: 2000;
            padding: 20px; overflow-y: auto;
        }
        #sidebar.open { transform: translateX(0); }

        /* КНОПКА МЕНЮ */
        #menu-btn {
            position: fixed; left: 15px; top: 15px; width: 45px; height: 45px;
            background: var(--neon); color: #000; border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2100; font-weight: bold; font-family: 'JetBrains Mono';
        }

        /* ТЕРМИНАЛ И ИНФО */
        .info-box { border-left: 2px solid var(--neon); padding: 8px; margin-bottom: 10px; background: #080808; font-size: 12px; }
        #ledger { height: 100px; overflow: auto; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--neon); margin: 5px 0; border: 1px solid #222; }
        
        input, button { width: 100%; padding: 10px; margin-top: 5px; background: #000; border: 1px solid var(--neon); color: var(--neon); }
        button { background: var(--neon); color: #000; font-weight: bold; }

        /* МОДАЛКА QR */
        #qr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">MENU</div>

<div id="sidebar">
    <div id="ton-connect-btn"></div>
    <div class="info-box" style="margin-top:15px; border-color: var(--gold);">
        <div style="opacity:0.5">MASTER:</div>
        <div style="font-size:9px; color:var(--gold)">UQC58LnAAihOCV9ysN7iMsMb9bDh2YnICma4UNVYQ0dSYqXQ</div>
    </div>
    
    <div class="info-box">
        BTC: <span id="p-btc">68K</span> | TON: 7.2<br>
        BPX: <span style="color:var(--gold)">3.1415</span>
    </div>

    <div id="ledger"></div>

    <input type="text" id="wa" placeholder="Wallet Address">
    <input type="number" id="wm" placeholder="Amount">
    <button onclick="send()">WITHDRAW (2% TAX)</button>
    <p style="font-size:9px; opacity:0.4; margin-top:10px;">BitPiX Quantum Oracle v2.5</p>
</div>

<div id="main">
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--neon); margin: 30px 0 10px 0;">
        <span>MATRIX_NODE_256</span>
        <span id="load">LOAD: 0%</span>
    </div>
    <div id="matrix-container"></div>
</div>

<div id="qr-overlay" onclick="this.style.display='none'">
    <div id="qrcode" style="background:#fff; padding:10px;"></div>
    <p style="color:var(--gold); font-size:12px; margin-top:10px;">SCAN TO COMPLETE TX</p>
</div>

<script>
    const container = document.getElementById('matrix-container');
    for(let i=0; i<256; i++) {
        const d = document.createElement('div');
        d.className = 'node'; d.id = 'n'+i;
        container.appendChild(d);
    }

    function send() {
        const a = document.getElementById('wa').value;
        const m = document.getElementById('wm').value;
        if(!a || !m) return;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: `ton://transfer/${a}?amount=${m*1e9}`, width: 200, height: 200 });
        document.getElementById('qr-overlay').style.display = 'flex';
        log(`TX_SENT: ${m} TO ${a.slice(0,6)}...`);
    }

    function log(m) {
        const l = document.getElementById('ledger');
        l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    }

    setInterval(() => {
        const id = Math.floor(Math.random()*256);
        const node = document.getElementById('n'+id);
        node.classList.add('active');
        setTimeout(() => node.classList.remove('active'), 200);
        document.getElementById('load').innerText = `LOAD: ${Math.floor(Math.random()*100)}%`;
        document.getElementById('p-btc').innerText = (68000 + Math.random()*200).toFixed(0);
    }, 800);

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://ngeneticum.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });
</script>
</body>
</html>
